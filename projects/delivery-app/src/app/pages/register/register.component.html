<div class="register-page">
  <div class="register-header">
    <a routerLink="/login" class="back-btn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/>
      </svg>
    </a>
    <h1>Join as Delivery Partner</h1>
    <p>Start earning with NexConnect</p>
  </div>

  <div class="register-form">
    @if (error()) {
      <div class="error-msg">{{ error() }}</div>
    }

    @if (step() === 1) {
      <h2>Personal Information</h2>
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" [(ngModel)]="form.first_name" placeholder="First name">
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" [(ngModel)]="form.last_name" placeholder="Last name">
        </div>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" [(ngModel)]="form.username" placeholder="Choose a username">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="form.email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" [(ngModel)]="form.phone" placeholder="Phone number">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="form.password" placeholder="Create password">
      </div>
      <button class="btn-primary" (click)="nextStep()">Continue</button>
    }

    @if (step() === 2) {
      <h2>Vehicle Information</h2>
      <div class="form-group">
        <label>Vehicle Type</label>
        <select [(ngModel)]="vehicle.vehicle_type">
          <option value="">Select vehicle type</option>
          <option value="bicycle">Bicycle</option>
          <option value="motorcycle">Motorcycle</option>
          <option value="car">Car</option>
          <option value="van">Van</option>
        </select>
      </div>
      <div class="form-group">
        <label>Vehicle Number</label>
        <input type="text" [(ngModel)]="vehicle.vehicle_number" placeholder="e.g. ABC-1234">
      </div>
      <div class="form-group">
        <label>License Number</label>
        <input type="text" [(ngModel)]="vehicle.license_number" placeholder="Driver's license number">
      </div>

      <div class="btn-row">
        <button class="btn-secondary" (click)="step.set(1)">Back</button>
        <button class="btn-primary" (click)="onRegister()" [disabled]="loading()">
          @if (loading()) {
            Registering...
          } @else {
            Register
          }
        </button>
      </div>
    }

    <p class="login-link">
      Already a partner? <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
