<div class="change-pw-page">
  <div class="change-pw-card">
    <div class="brand">
      <span class="material-icons-outlined brand-icon">local_shipping</span>
      <span class="brand-name">NexConnect</span>
    </div>

    <div class="lock-icon">
      <span class="material-icons-outlined">lock_reset</span>
    </div>

    <h1 class="title">Set Your Password</h1>
    <p class="subtitle">Your account requires a password change before you can continue. Please choose a secure, permanent password.</p>

    @if (success()) {
      <div class="success-msg">
        <span class="material-icons-outlined">check_circle</span>
        Password updated! Redirecting to dashboard…
      </div>
    } @else {
      <form class="form" (ngSubmit)="onSubmit()">
        @if (error()) {
          <div class="error-banner">{{ error() }}</div>
        }

        <div class="field">
          <label class="label">Temporary Password</label>
          <input
            class="input"
            type="password"
            [(ngModel)]="currentPassword"
            name="currentPassword"
            placeholder="Enter the temporary password"
            autocomplete="current-password"
            required
          />
        </div>

        <div class="field">
          <label class="label">New Password</label>
          <input
            class="input"
            type="password"
            [(ngModel)]="newPassword"
            name="newPassword"
            placeholder="At least 8 characters"
            autocomplete="new-password"
            required
          />
        </div>

        <div class="field">
          <label class="label">Confirm New Password</label>
          <input
            class="input"
            type="password"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            placeholder="Repeat new password"
            autocomplete="new-password"
            required
          />
        </div>

        <button class="btn-submit" type="submit" [disabled]="loading()">
          @if (loading()) {
            <span class="spinner"></span> Updating…
          } @else {
            <span class="material-icons-outlined">lock</span> Set Password & Continue
          }
        </button>
      </form>
    }

    <button class="btn-logout" (click)="logout()">
      <span class="material-icons-outlined">logout</span>
      Sign Out
    </button>
  </div>
</div>
