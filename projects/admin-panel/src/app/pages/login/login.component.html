<div class="login-page">
  <!-- Left Panel — Brand / Hero -->
  <div class="login-hero">
    <div class="hero-content">
      <div class="hero-logo">
        <span class="logo-letter">N</span>
      </div>
      <h1 class="hero-title">NexConnect Admin</h1>
      <p class="hero-sub">Manage vendors, customers, orders and more — all in one place.</p>

      <div class="hero-features">
        <div class="feature-item">
          <span class="material-icons-outlined">storefront</span>
          <span>Vendor management</span>
        </div>
        <div class="feature-item">
          <span class="material-icons-outlined">receipt_long</span>
          <span>Real-time order tracking</span>
        </div>
        <div class="feature-item">
          <span class="material-icons-outlined">analytics</span>
          <span>Platform analytics</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Panel — Form -->
  <div class="login-form-panel">
    <div class="login-card">
      <div class="login-header">
        <h2>Sign in</h2>
        <p>Enter your admin credentials to continue</p>
      </div>

      @if (error()) {
        <div class="alert-error">{{ error() }}</div>
      }

      <form (ngSubmit)="onLogin()">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-input" type="text" [(ngModel)]="username"
            name="username" placeholder="Admin username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" [(ngModel)]="password"
            name="password" placeholder="Password" required autocomplete="current-password">
        </div>
        <button type="submit" class="login-btn" [disabled]="loading()">
          @if (loading()) {
            <span class="btn-spinner"></span>
            Signing in...
          } @else {
            Sign In
          }
        </button>
      </form>
    </div>
  </div>
</div>
